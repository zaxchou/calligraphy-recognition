<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 红色印章背景 -->
  <rect x="2" y="2" width="96" height="96" rx="4" fill="#c45c48"/>
  
  <!-- 印章边框 -->
  <rect x="6" y="6" width="88" height="88" rx="2" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- 印字 - 周 (模仿您提供的图片风格) -->
  <g fill="#fff">
    <!-- 外框 - 更粗更古朴 -->
    <rect x="20" y="15" width="60" height="65" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
    
    <!-- 土字旁 - 上方 -->
    <rect x="32" y="25" width="14" height="10" rx="1"/>
    <rect x="37" y="35" width="4" height="30" rx="1"/>
    
    <!-- 口字部分 - 上下两个 -->
    <rect x="52" y="25" width="18" height="10" rx="1"/>
    <rect x="52" y="45" width="18" height="10" rx="1"/>
    
    <!-- 底部口字 -->
    <path d="M35 72 Q50 85 65 72 L65 78 Q50 92 35 78 Z"/>
  </g>
</svg>